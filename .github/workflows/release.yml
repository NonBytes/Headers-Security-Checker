name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: hsc-linux-amd64
            executable_name: hsc
          - os: macos-latest
            asset_name: hsc-macos-amd64
            executable_name: hsc
          - os: windows-latest
            asset_name: hsc-windows-amd64.exe
            executable_name: hsc.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Prepare asset
        shell: bash
        run: |
          mv target/release/${{ matrix.executable_name }} target/release/${{ matrix.asset_name }}

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/release/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
